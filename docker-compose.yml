
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bambudash-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-bambudash}
    ports:
      - "5432:5432"
    restart: always

  backend:
    container_name: bambudash-backend
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:changeme@db:5432/bambudash}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - BAMBU_CLOUD_HOST=${BAMBU_CLOUD_HOST:-us.mqtt.bambulab.com}
      - BAMBU_CLOUD_PORT=${BAMBU_CLOUD_PORT:-8883}
      - BAMBU_CLOUD_USERNAME=${BAMBU_CLOUD_USERNAME:-}
      - BAMBU_CLOUD_PASSWORD=${BAMBU_CLOUD_PASSWORD:-}
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
