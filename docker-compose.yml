
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bambudash-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    restart: always

  backend:
    container_name: bambudash-backend
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - BAMBU_CLOUD_HOST=${BAMBU_CLOUD_HOST}
      - BAMBU_CLOUD_PORT=${BAMBU_CLOUD_PORT}
      - BAMBU_CLOUD_USERNAME=${BAMBU_CLOUD_USERNAME}
      - BAMBU_CLOUD_PASSWORD=${BAMBU_CLOUD_PASSWORD}
    depends_on:
      - db
    restart: always

  frontend:
    container_name: bambudash-frontend
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
