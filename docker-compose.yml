
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bambudash-db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=bambudash
    ports:
      # Expose the port to the host machine for potential direct access/debugging
      - "5432:5432"
    restart: always

  backend:
    container_name: bambudash-backend
    build: .
    ports:
      - "8000:8000"
    environment:
      # The DATABASE_URL must point to the 'db' service hostname
      - DATABASE_URL=postgresql://postgres:password@db:5432/bambudash
      # You can add other environment variables from core/config.py here
      # - SECRET_KEY=your_production_secret_key
      # - MQTT_BROKER_HOST=your_mqtt_broker_ip
    depends_on:
      - db
    restart: always

volumes:
  postgres_data:
